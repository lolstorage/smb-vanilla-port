name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Pulls Nes_Snd_Emu and other submodules

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      # This ensures Meson finds the native Visual Studio C/C++ compiler

    - name: Configure Meson
      run: meson setup builddir

    - name: Compile Project
      run: meson compile -C builddir

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: smb-vanilla-port-windows
        path: builddir/*.exe  # Adjust this path if the binary outputs to a subfolder
